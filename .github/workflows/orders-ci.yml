name: orders-ci

on:
  pull_request:
    branches: [main]
    paths:
      - 'Src/Orders/**'
      - '.github/workflows/orders-ci.yml'
  push:
    branches: [main]
    paths:
      - 'Src/Orders/**'

jobs:
  ci:
    uses: ./.github/workflows/dotnet-ci-template.yml
    with:
      service-path: Src/Orders

  publish:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack Orders.Contracts
        run: dotnet pack Src/Orders/Orders.Contracts/Orders.Contracts.csproj --configuration Release --output ./nupkgs

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "./nupkgs/*.nupkg" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --skip-duplicate
      