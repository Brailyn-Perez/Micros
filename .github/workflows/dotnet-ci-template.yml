name: dotnet-ci-template

on:
  workflow_call:
    inputs:
      service-path:
        required: true
        type: string

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release
  ARTIFACTS_PATH: ./artifacts

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # ⭐ AQUI: En PR empaqueta localmente
      - name: Pack internal dependencies (for PR)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p ${{ env.ARTIFACTS_PATH }}
          dotnet pack Src/Orders/Orders.Contracts/Orders.Contracts.csproj \
            --configuration ${{ env.CONFIGURATION }} \
            --output ${{ env.ARTIFACTS_PATH }}

      - name: Configure GitHub Packages (for main)
        if: github.event_name == 'push'
        run: |
          dotnet nuget add source --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Configure local NuGet source (for PR)
        if: github.event_name == 'pull_request'
        run: |
          dotnet nuget add source ${{ github.workspace }}/${{ env.ARTIFACTS_PATH }} \
            -n local

      - name: Restore
        run: dotnet restore "${{ inputs.service-path }}"

      - name: Build
        run: dotnet build "${{ inputs.service-path }}" \
          --no-restore \
          --configuration ${{ env.CONFIGURATION }}

      - name: Check for tests
        id: check-tests
        run: |
          TEST_PROJECT=$(find "${{ inputs.service-path }}" -maxdepth 3 \
            \( -name "*Tests.csproj" -o -name "*Test.csproj" \) | head -1)
          echo "found=$([ -n "$TEST_PROJECT" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Run tests
        if: steps.check-tests.outputs.found == 'true'
        run: |
          dotnet test "${{ inputs.service-path }}" \
            --no-build \
            --configuration ${{ env.CONFIGURATION }}