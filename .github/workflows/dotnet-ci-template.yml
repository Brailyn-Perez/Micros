name: dotnet-ci-template

on:
  workflow_call:
    inputs:
      service-path:
        required: true
        type: string
      contract-project-path:
        required: false
        type: string
        description: "Path to the .Contracts project to publish (e.g., Src/Orders/Orders.Contracts/Orders.Contracts.csproj)"

env:
  DOTNET_VERSION: '8.0.x'
  CONFIGURATION: Release
  ARTIFACTS_PATH: ./artifacts

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para obtener el historial de commits

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # === Preparación de dependencias ===
      
      - name: Pack internal dependencies (for PR)
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p ${{ env.ARTIFACTS_PATH }}
          dotnet build Src/Orders/Orders.Contracts/Orders.Contracts.csproj \
            --configuration ${{ env.CONFIGURATION }}
          dotnet pack Src/Orders/Orders.Contracts/Orders.Contracts.csproj \
            --configuration ${{ env.CONFIGURATION }} \
            --output ${{ env.ARTIFACTS_PATH }}

      - name: Configure GitHub Packages (for main branch pushes)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          dotnet nuget add source --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Configure local NuGet source (for PR)
        if: github.event_name == 'pull_request'
        run: |
          dotnet nuget add source ${{ github.workspace }}/${{ env.ARTIFACTS_PATH }} \
            -n local

      - name: Restore
        run: dotnet restore "${{ inputs.service-path }}"

      - name: Build
        run: dotnet build "${{ inputs.service-path }}" \
          --no-restore \
          --configuration ${{ env.CONFIGURATION }}

      - name: Check for tests
        id: check-tests
        run: |
          TEST_PROJECT=$(find "${{ inputs.service-path }}" -maxdepth 3 \
            \( -name "*Tests.csproj" -o -name "*Test.csproj" \) | head -1)
          echo "found=$([ -n "$TEST_PROJECT" ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

      - name: Run tests
        if: steps.check-tests.outputs.found == 'true'
        run: |
          dotnet test "${{ inputs.service-path }}" \
            --no-build \
            --configuration ${{ env.CONFIGURATION }}

      # === Publicación de NuGet ===

      - name: Generate version for PR
        if: github.event_name == 'pull_request' && inputs.contract-project-path != ''
        id: version
        run: |
          # Obtén la versión base del .csproj
          BASE_VERSION=$(grep -oPm1 "(?<=<Version>)[^<]+" "${{ inputs.contract-project-path }}" || echo "1.0.0")
          # Crea versión con sufijo PR
          PR_VERSION="${BASE_VERSION}-pr${GITHUB_RUN_NUMBER}"
          echo "version=${PR_VERSION}" >> $GITHUB_OUTPUT
          echo "PR Version: ${PR_VERSION}"

      - name: Pack contract project (for PR publish)
        if: github.event_name == 'pull_request' && inputs.contract-project-path != ''
        run: |
          mkdir -p ${{ env.ARTIFACTS_PATH }}
          dotnet pack "${{ inputs.contract-project-path }}" \
            --configuration ${{ env.CONFIGURATION }} \
            --output ${{ env.ARTIFACTS_PATH }} \
            --version-suffix "pr${GITHUB_RUN_NUMBER}"

      - name: Configure GitHub Packages for publish
        if: github.event_name == 'pull_request' && inputs.contract-project-path != ''
        run: |
          dotnet nuget add source --username "${{ github.actor }}" \
            --password "${{ secrets.GITHUB_TOKEN }}" \
            --store-password-in-clear-text \
            --name github \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            || true

      - name: Publish contract to GitHub Packages (for PR)
        if: github.event_name == 'pull_request' && inputs.contract-project-path != ''
        run: |
          dotnet nuget push ${{ env.ARTIFACTS_PATH }}/*.nupkg \
            --source github \
            --skip-duplicate \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            || echo "Package already exists or publish failed"

      - name: Upload NuGet artifacts
        if: github.event_name == 'pull_request' && inputs.contract-project-path != ''
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: ${{ env.ARTIFACTS_PATH }}/*.nupkg
          retention-days: 7